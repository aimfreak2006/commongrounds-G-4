{% extends 'base.html' %}

{% block title %}User Login{% endblock %}


{% block home %}

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}
        <button type="submit">Login</button>
    </form>

    <br>
    <a href="{% url 'accounts:password_reset' %}">Forgot Password?</a>
{% endblock %}
