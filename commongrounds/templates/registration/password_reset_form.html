{% extends 'base.html' %}
{% load static %}

{% block home %}
    <link rel="stylesheet" href="{% static 'css/form_password_reset.css' %}">
    <div class="fullscreen-center">
        <div class="box-container">
            <div class="layer-1-logo">
                <div class="layer-2-logo">
                    <div class="logo-container">
                        <a href="/"><img src="{% static 'images/logo.png' %}" alt="Common Grounds Logo" class="logo"></a>
                        <p id="welcome-message"><b>Welcome back to Common Grounds!</b>
                            <br>Update your password below.</p>
                    </div>
                </div>
            </div>

            <div class="login-register-container"> 
                <h2 class="form-title">PASSWORD RESET</h2>
                <p class="form-description">Enter your email address to receive a password reset link.</p>

                <form method="post" class="password-reset-form">
                    {% csrf_token %}

                    <div class="field-container">
                        {{ form.email }}
                    </div>

                    <button type="submit" class="auth-button">Reset</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
