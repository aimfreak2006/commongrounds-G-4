{% extends "commissions/commission_base.html" %}
{% load static %}

{% block contents %}
    <br>
    <br>
    <br>
    <form action="/commissions/requests/" method="POST">
        <fieldset>
            <legend>Commission Form</legend>
            {% csrf_token %}
            {{ commission_form }}
        </fieldset>
        <fieldset>
            <legend>Job Form</legend>
            {{job_forms.management_form}}

            {% for job_form in job_forms %}
                {{ job_form }}
                <br>
                <br>
            {% endfor %}
        </fieldset>
        <input type="submit" name="submit" value="Save Form">
    </form>
{% endblock %}
