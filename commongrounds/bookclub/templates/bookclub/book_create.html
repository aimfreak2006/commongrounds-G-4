{% extends 'bookclub/book_base.html' %}
{% load static %}

{% block contents %}
    <div class="contents-container">
        <h2>Add a Book</h2>
        <br>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Add Book</button>
        </form>

        <br>
        <a href="{% url 'bookclub:book_list' %}">Back to all books</a>
    </div>
{% endblock %}
