{% extends 'localevents/event_base.html' %}
{% load static %}

{% block contents %}
<div class="contents-container">
    <h2>{{ event.title }}</h2>
    <br>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Changes</button>
    </form>

    <a href="{% url 'localevents:event_list' %}">Look for Upcoming Events</a>
</div>

{% endblock %}
